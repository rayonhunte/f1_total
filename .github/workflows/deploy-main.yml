name: Deploy Firebase (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: f1total-c37f3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install web deps
        run: npm ci

      - name: Install functions deps
        run: npm --prefix functions ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web
        run: npm run build

      - name: Build functions
        run: npm run functions:build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_F1TOTAL_C37F3 }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --non-interactive --only firestore:rules,functions,hosting
